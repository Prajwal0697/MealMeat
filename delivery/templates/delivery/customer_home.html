<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Page</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'delivery/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">Meal Buddy</a>
        <div class="user-nav">
            <span>Welcome, <strong>{{username}}</strong>!</span>
            <a href="{% url 'signout' %}" class="btn btn-secondary" style="margin-left: 1rem; padding: 0.5rem 1rem; font-size: 0.9rem;">Sign Out</a>
        </div>
    </header>

    <div class="container">
        <h3>Available Restaurants</h3>

        <table border="1">
            <thead>
                <tr>
                    <th>Restaurant name</th>
                    <th>Picture</th>
                    <th>Cuisine</th>
                    <th>Rating</th>
                    <th>Operations</th>
                </tr>
            </thead>
            <tbody>
                {%  for r in restaurantList %}
                    <tr>
                        <td>{{ r.name }}</td>
                        <td>
                            <img src="{{ r.picture }}" alt="{{ r.name }}">
                        </td>
                        <td>{{ r.cuisine }}</td>
                        <td>{{ r.rating }} ⭐</td>
                        <td>
                            <a href="{% url 'view_menu' r.id username %}" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                                View Menu
                            </a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
