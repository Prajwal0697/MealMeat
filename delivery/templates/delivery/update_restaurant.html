<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'delivery/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">Meal Buddy Admin</a>
        <div class="user-nav">
            <a href="{% url 'open_show_restaurant' %}" class="btn btn-secondary">Back to Restaurants</a>
        </div>
    </header>

    <div class="container" style="max-width: 500px;">
        <h3>Update Restaurant Info</h3>
        
        <form action="{% url 'update_restaurant' restaurant.id %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Restaurant Name</label>
                <input type="text" name="name" value="{{restaurant.name}}" required>
            </div>

            <div class="form-group">
                <label>Picture URL</label>
                <input type="text" name="picture" value="{{restaurant.picture}}">
            </div>

            <div class="form-group">
                <label>Cuisine</label>
                <input type="text" name="cuisine" value="{{restaurant.cuisine}}" required>
            </div>

            <div class="form-group">
                <label>Rating (0-5)</label>
                <input type="number" name="rating" min="0" max="5" step="0.1" value="{{restaurant.rating}}" required>
            </div>

            <button type="submit" class="btn">Update Restaurant</button>
        </form>
    </div>
</body>

</html>
