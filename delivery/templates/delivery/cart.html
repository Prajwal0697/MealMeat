<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'delivery/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">Meal Buddy</a>
        <div class="user-nav">
            <span>Welcome, <strong>{{username}}</strong>!</span>
            <a href="{% url 'customer_home' username %}" class="btn btn-secondary" style="margin-left: 1rem; padding: 0.5rem 1rem; font-size: 0.9rem;">Back to Menu</a>
        </div>
    </header>

    <div class="container">
        <h3>Your Cart</h3>

        <table border="1">
            <thead>
                <tr>
                    <th>Item Image</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                {%  for item in itemList %}
                    <tr>
                        <td>
                            <img src="{{ item.picture }}" alt="{{ item.name }}">
                        </td>
                        <td>{{ item.name }}</td>
                        <td>{{ item.description }}</td>
                        <td>₹{{ item.price }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <div class="total-section">
            <p>Total Price: ₹{{total_price}}</p>
            <form action="{% url 'checkout' username %}" style="margin-top: 1.5rem;">
                <button type="submit" class="btn" style="width: 100%; max-width: 300px; margin-left: auto;">CHECK OUT</button>
            </form>
        </div>
    </div>
</body>

</html>
