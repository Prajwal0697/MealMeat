<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'delivery/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">Meal Buddy</a>
        <div class="user-nav">
            <span>Welcome, <strong>{{username}}</strong>!</span>
            <a href="{% url 'show_cart' username %}" class="btn" style="margin-left: 1rem; padding: 0.5rem 1rem; font-size: 0.9rem;">Go to Cart 🛒</a>
        </div>
    </header>

    <div class="container">
        <h3>Menu</h3>

        <table border="1">
            <thead>
                <tr>
                    <th>Item name</th>
                    <th>Picture</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Is veg?</th>
                    <th>Operation</th>
                </tr>
            </thead>
            <tbody>
                {%  for item in itemList %}
                    <tr>
                        <td>{{ item.name }}</td>
                        <td>
                            <img src="{{ item.picture }}" alt="{{ item.name }}">
                        </td>
                        <td>{{ item.description }}</td>
                        <td>₹{{ item.price }}</td>
                        <td>{% if item.vegeterian %}🟢 Veg{% else %}🔴 Non-Veg{% endif %}</td>
                        <td>
                            <a href="{% url 'add_to_cart' item.id username %}" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                                Add to cart
                            </a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
